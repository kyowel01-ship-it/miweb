name: TuCloud Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tucloud-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Notify TuCloud - building
        continue-on-error: true
        env:
          CALLBACK_URL: ${{ secrets.TUCLOUD_CALLBACK_URL }}
          CALLBACK_TOKEN: ${{ secrets.TUCLOUD_CALLBACK_TOKEN }}
          PROJECT_ID: ${{ secrets.TUCLOUD_PROJECT_ID }}
          DEPLOYMENT_STATUS: building
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'Deployment manual' }}
        run: |
          node -e 'const body={projectId:process.env.PROJECT_ID,status:process.env.DEPLOYMENT_STATUS,runId:process.env.RUN_ID,repository:process.env.REPOSITORY,branch:process.env.GITHUB_REF_NAME,commitSha:process.env.GITHUB_SHA,commitMessage:process.env.COMMIT_MESSAGE};fetch(process.env.CALLBACK_URL,{method:"POST",headers:{"content-type":"application/json",authorization:"Bearer "+process.env.CALLBACK_TOKEN},body:JSON.stringify(body)}).then(async response=>{if(!response.ok)throw new Error("Callback HTTP "+response.status)})'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f package.json ]]; then
            echo "Static project without package.json; dependency installation is not required."
          elif [[ -f pnpm-lock.yaml ]]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [[ -f yarn.lock ]]; then
            corepack enable
            yarn install --immutable || yarn install --frozen-lockfile
          elif [[ -f package-lock.json || -f npm-shrinkwrap.json ]]; then
            npm ci
          else
            npm install
          fi
      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f package.json ]]; then
            echo "Static project; build step is not required."
            exit 0
          fi
          if ! node -e 'const p=require("./package.json"); process.exit(p.scripts?.build ? 0 : 1)'; then
            echo "No build script found; TuCloud will validate the static output next."
            exit 0
          fi
          if [[ -f pnpm-lock.yaml ]]; then
            pnpm run build
          elif [[ -f yarn.lock ]]; then
            yarn build
          else
            npm run build
          fi
      - name: Prepare safe web output
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/tucloud-output
          mkdir -p /tmp/tucloud-output
          output=""
          for candidate in out dist build; do
            if [[ -f "$candidate/index.html" ]]; then
              output="$candidate"
              break
            fi
          done
          if [[ -n "$output" ]]; then
            cp -a "$output/." /tmp/tucloud-output/
          elif [[ ! -f package.json && -f index.html ]]; then
            tar --exclude-vcs --exclude='.github' --exclude='.env*' --exclude='node_modules'               --exclude='*.md' --exclude='package*.json' --exclude='pnpm-lock.yaml' --exclude='yarn.lock'               -cf - . | tar -xf - -C /tmp/tucloud-output
          else
            echo "No deployable static output found. Expected out/, dist/ or build/ with index.html." >&2
            echo "Next.js projects must use output: 'export'. Node.js/SSR runtimes are not enabled yet." >&2
            exit 1
          fi
          test -f /tmp/tucloud-output/index.html
      - name: Package immutable release
        run: tar -C /tmp/tucloud-output -czf /tmp/tucloud-release.tgz .
      - name: Upload and activate
        env:
          UPLOAD_URL: ${{ secrets.TUCLOUD_UPLOAD_URL }}
          CALLBACK_TOKEN: ${{ secrets.TUCLOUD_CALLBACK_TOKEN }}
          PROJECT_ID: ${{ secrets.TUCLOUD_PROJECT_ID }}
        run: |
          curl --fail-with-body --show-error --silent --request POST \
            --header "Authorization: Bearer $CALLBACK_TOKEN" \
            --header "Content-Type: application/gzip" \
            --header "X-Tucloud-Commit-Sha: $GITHUB_SHA" \
            --data-binary @/tmp/tucloud-release.tgz \
            "$UPLOAD_URL?projectId=$PROJECT_ID"
      - name: Notify TuCloud - completed
        if: always()
        continue-on-error: true
        env:
          CALLBACK_URL: ${{ secrets.TUCLOUD_CALLBACK_URL }}
          CALLBACK_TOKEN: ${{ secrets.TUCLOUD_CALLBACK_TOKEN }}
          PROJECT_ID: ${{ secrets.TUCLOUD_PROJECT_ID }}
          DEPLOYMENT_STATUS: ${{ job.status }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'Deployment manual' }}
        run: |
          node -e 'const body={projectId:process.env.PROJECT_ID,status:process.env.DEPLOYMENT_STATUS,runId:process.env.RUN_ID,repository:process.env.REPOSITORY,branch:process.env.GITHUB_REF_NAME,commitSha:process.env.GITHUB_SHA,commitMessage:process.env.COMMIT_MESSAGE};fetch(process.env.CALLBACK_URL,{method:"POST",headers:{"content-type":"application/json",authorization:"Bearer "+process.env.CALLBACK_TOKEN},body:JSON.stringify(body)}).then(async response=>{if(!response.ok)throw new Error("Callback HTTP "+response.status)})'
